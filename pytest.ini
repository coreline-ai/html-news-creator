[pytest]
# Register custom markers so `pytest -m integration` doesn't print
# PytestUnknownMarkWarning. The integration marker is auto-applied to
# every test under ``tests/integration/`` by that folder's conftest.py
# so the unit suite (`pytest -m "not integration"`) skips them by default.
markers =
    integration: live FastAPI + SSE/HTTP smoke tests (in-memory ASGI; mocked subprocess)
