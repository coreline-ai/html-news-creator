name: Daily AI Trend Report

on:
  schedule:
    - cron: "0 22 * * *"  # 07:00 KST
  workflow_dispatch:
    inputs:
      date:
        description: "Report date (YYYY-MM-DD, default: today)"
        required: false
      mode:
        description: "Pipeline mode"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - rss-only
          - dry-run

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run daily pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # GPT-5.5 OpenAI-compatible proxy defaults.
          # On GitHub-hosted runners, override OPENAI_BASE_URL to a reachable endpoint
          # or run the proxy on a self-hosted runner at 127.0.0.1:4317.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'local-proxy' }}
          OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL || 'http://127.0.0.1:4317/openai/v1' }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          OPENAI_EMBEDDING_MODEL: ${{ vars.OPENAI_EMBEDDING_MODEL || 'text-embedding-3-small' }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          DATE="${{ github.event.inputs.date }}"
          MODE="${{ github.event.inputs.mode || 'full' }}"
          if [ -n "$DATE" ]; then
            python scripts/run_daily.py --date "$DATE" --mode "$MODE"
          else
            python scripts/run_daily.py --mode "$MODE"
          fi

      - name: Deploy to Netlify
        if: success()
        run: netlify deploy --prod --dir public --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ github.run_id }}
          path: public/news/
          retention-days: 30
