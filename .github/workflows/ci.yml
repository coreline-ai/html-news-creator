name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest tests/unit/ -v --tb=short -m "not integration"

      - name: Check imports
        run: |
          PYTHONPATH=. python -c "
          from app.config import settings
          from app.collectors.orchestrator import CollectorOrchestrator
          from app.extractors.orchestrator import ExtractorOrchestrator
          from app.verification.verifier import SourceVerifier
          from app.generation.embeddings import EmbeddingClient
          from app.generation.clusterer import HDBSCANClusterer
          from app.rendering.jinja_renderer import JinjaRenderer
          print('All imports OK')
          "

      - name: Design-token lint (operator webapp)
        run: python3 scripts/lint_design_tokens.py

      - name: Token build drift check (tokens.json → tokens.css)
        run: python3 scripts/build_tokens.py --check
